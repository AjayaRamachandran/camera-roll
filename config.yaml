# Camera Roll configuration.
#
# Tuning lives here and is shared across every photo library. Which folders are
# libraries, and which one is being viewed, is chosen in the app at runtime (and
# stored in <index_dir>/libraries.json), not here.

# Seed for the very first library, only used to adopt a pre-existing index the
# first time the new multi-library layout runs. After that, libraries are added
# and switched from the app, and this value is ignored.
photo_root: "C:\\Users\\Ajaya\\OneDrive\\Pictures\\iPhone Backup 6-12-26"

# The indexes ROOT: the folder that holds one index subfolder per library, plus
# libraries.json (the source-to-index map) and a shared models/ folder. Used as
# the default location on first run; the user can choose a different one in the
# app. Each library's subfolder contains:
#   index.json        sorted list of every photo (original path + thumbnail)
#   thumbnails/        one cropped JPG per photo
#   megatiles/g5, g10, g20   composed tiles per zoom level the grid renders
index_dir: "C:\\Users\\Ajaya\\OneDrive\\Pictures\\Indexes"

# Thumbnail edge length in pixels (square, center-cropped).
# Must equal TILE_PX / smallest_grid so primary-level cells fit thumbnails
# without upscaling. TILE_PX is rounded up to the LCM of all tile_grids, so
# choose a value where thumb_size * tile_grids[0] is already that multiple
# (e.g. 300 * 7 = 2100 = LCM(7,15,30) * 10).
thumb_size: 300

# Mega-tile grid dimensions, one set of tiles per level. Lower numbers show
# larger photos (fewer per screen); higher numbers pack more photos in. Each
# level's tiles are the same pixel size, so the densest sets are the cheapest.
tile_grids: [7, 15, 30]

# JPEG quality for the generated thumbnails and mega-tiles (1-95).
jpeg_quality: 80

# Background indexing that runs after the main library is ready, without
# blocking browsing. Today this groups the faces in your photos into people;
# more passes (text, places) can be added later.
secondary_index:
  enabled: true
  faces:
    # Cosine distance (0..2) between face embeddings; at or below this counts as
    # the same person. Higher is more forgiving (fewer separate people, more
    # chance of lumping two people together). Tune for the ArcFace model in use.
    similar_threshold: 0.55
    # Max stored sample faces compared per known person before deciding (the "X"
    # that keeps matching from growing with the album size).
    max_samples_per_person: 5
    # Longest edge (px) the original is downscaled to before face detection.
    detection_input_size: 1024
    # Detections below this confidence are ignored.
    min_det_score: 0.6
    # Folder holding the ONNX model files. Empty -> <index_dir>/models.
    models_dir: ""
    # Fewest photos a person must appear in to show up in the People view. Hides
    # one-off clusters from strangers and stray detections.
    min_people_count: 6
    # Threads each face-model run may use. 1 keeps each photo on a single core so
    # the worker can run many photos in parallel across cores instead. 0 lets the
    # runtime decide (better when indexing one photo at a time).
    ort_intra_op_threads: 1
  worker:
    # Pause between photos so the background pass stays out of the way.
    work_sleep_ms: 10
    # While the main library scan is running, the face pass yields and rechecks
    # this often instead of competing for the CPU.
    scan_yield_ms: 200
    # Persist progress every N photos (and whenever the pass goes idle).
    flush_every: 25
    # Photos detected at once in the foreground (fast) mode. 0 = one per CPU core.
    foreground_workers: 0
    # Base the live time estimate on the rate over the last N photos (per index
    # type). Smaller = more reactive to the current speed; larger = smoother. Too
    # small and a short run of easy photos makes it falsely read "almost done".
    eta_window_units: 150

# Reverse-geocode each photo's GPS into searchable place keywords (nearest
# landmark, town/city, state, country). This runs as a second background pass
# next to faces and repairs itself the same way. It needs the bundled GeoNames
# data in server/geodata (built once by server/tools/build_geo_data.py); without
# that data the pass stays off and face indexing is unaffected.
locations:
  # A landmark is attached only when a notable place is within this many metres
  # of the photo; otherwise the landmark field is left empty.
  landmark_threshold_m: 750
  # Folder holding the bundled GeoNames extracts. Empty -> server/geodata.
  data_dir: ""
